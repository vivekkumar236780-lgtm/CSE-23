<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        //array is collection of any data types
        let num=[3,5,6,9,10,12,14,16];
        console.log(num.lastIndexOf(9));
        console.log("length is " + num.length);
        console.log(num.pop());
        console.log("updated array is "+num);
        //add element at end of array
        console.log(num.push(99));
        console.log("updated array after push is "+num);

        //shift and unshift
        //shift remove first element of array and return the removed element
        console.log(num.shift());
        console.log(`upadted array after shift is ${num}`);
        //unshift add element at start of array and return the new length of array
        console.log(num.unshift(45));
        console.log(`updated array after unshift is ${num}`);


    </script>


    
</body>
</html>
