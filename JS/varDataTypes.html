<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Value Types in JS</title>
</head>
<body>
    <script>
        //JS Data Value Types
        //Primittive - immutable and store single value in a variable 
        //String,Number,Boolean,Null,Undefined,Symbol,BigInt
         
        //String
        var myName="vivek jaiswal";
        console.log(myName);
        //number
        var myMob=7281818182;
        console.log(myName +"mobile number is"+myMob);
        //boolean
        var isMarried=false;
        console.log(myName + " is married? " + isMarried);
        //undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));
        //null
        var myAddress=null;
        console.log(myAddress);
        console.log(typeof(myAddress));
        var myNum=BigInt(92636844887374884);
        console.log(myNum);
        console.log(typeof(myNum));
        //symbol
        var var1=Symbol("vivek");
        var var2=Symbol("vivek");
        console.log(var1==var2); // false as symbol is unique and immutable data type
        var var3="vishal";
        var var4="vishal";
        console.log(var3==var4); //true as string is not unique and immutable adata type

        //non-primitive data types-mmutable and can store multiple values in a single variable
        //Reference Type(object)--collection of different variables and keep the data in key value pair
        //function(),array[] comes under object data type
        let myInfo={
            name:"Vivek",
            age:20,
            isMarried:false,
            address:"Bihar",
            branch:"CSE",
            section:23
        };
        console.log(myInfo);
        console.log(myInfo.name + " " + myInfo.age);
        //object length
        var keys=Object.keys(myInfo);
        console.log(keys);
        console.log(keys.length);
        //function -block of code which perform a specfic task
        function cal(){
            var num1=45;
            var num2=40;
            var add=num1+num2;
            console.log("Addition of two numbers is "+add);
        }
        cal();
        //array-collection of any data type and it is ordered
        let studentList=["stu1","stu2","stu3","stu4"];
        console.log(studentList[0]);
        //for different data types
        let stu1=["Vishal",20,false,"Bihar","CSE",null,18];
        console.log(stu1);
        console.log(stu1.length);
         
        //to iterate array number
        for(let i=0;i<stu1.length;i++){
            console.log(stu1[i]);

        }
        for(let x in stu1){
            console.log(stu1[x]);
            
        }


    </script>
    
</body>
</html>
