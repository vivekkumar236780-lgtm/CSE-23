<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script</title>
</head>
<body>
    <script>
        //JS variables contains either values or not
        var myName = "Vivek";
        document.write(myName); //global variable as it print on browser window
        console.log(myName);
        var myName="rohit"; // var can be redeclare and reassign
        console.log(myName);
        function demo() {
            var msg="Hello ABES";
            console.log(msg);
        }
        demo();
        //variable declaration using let and const
        let myNumber=9142046063;
        console.log(myNumber);
        myNumber=7886273838; // let has no redeclare but reassign
        console.log(myNumber);
        const myEmail="vivek@abes.ac.in";
        console.log(myEmail);
        //myEmail="vyedtcd@abes.ac.in"; // const has no redclare and no reassign
        console.log(myEmail);
        

    </script>
    
</body>
</html>
