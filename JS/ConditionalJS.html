<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //conditional statement: allow code to make decisoin and run different blocks of code based on whether a condition is true or false.
        //if condition..

        //age validation for vote casting!
        let age=23;
        if(age>=18){
            console.log(age + " is valid age of vote casting");
        }
        if(age<18){
            console.log(age + " is not valid age of vote casting");
        }

        //if else..
        let myAge=20;
        if(myAge<18){
            console.log("not valid age");
        }
        else{
            console.log("valid age");
        }
        //switch..
        let grade='A';
        switch(grade){
            case 'A' : result="First Division";
            break;
            case 'B' : result="Second division";
            break;
            case 'C' : result="Third Division";
            break;
            default : result="Fail";
        }
        console.log(result);

        //if else if else..
        let marks=35;
        if(marks>60){
            console.log("First Grade");

        }
        else if(marks<60 && marks>=40){  //else if condition ccan be used multiple time but if,else can be used only once in block of code
            console.log("second Grade");
        }
        else if(marks<40 && marks>=33){
            console.log("Third Grade");

        }
        else{
            console.log("Fail");
        }

    </script>
    
</body>
