<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //Function:- block of code,used or defined to perform specific
        //Types of Function
        //normal function: with para,without para,and with default para
        //normal function without parameter..
        function demo() {
            console.log("Hello JS");
        }
        demo(); //function calling
        //with parameter..
        function demo1(text){
            console.log("Hello "+ text);
        }
        demo1("react");

        //default parameter

        function add(a,b=10){
            console.log("Addition is " + (a+b));
        }
        add(123);
        //sycronous 
        function cal(){
            function add(a,b){
                console.log(a+b);

            }
            function mul(x,y){
                console.log(x*y);
            }
            function sub(p,q){
                console.log(p-q);
            }
        
        add(3,4);
        sub(9,6);
        mul(3,6);
        }
        cal();
        //anonymous function:- function without name
        let msg=function(){
            console.log("Hello ABES");
            //console.log(typeof(msg));
        }
        msg();
        //arrow function:- short code and more concise syntax for writing function in JS
        let msg1=()=>console.log("Hello ABESSS EC");
        msg1();
        // arrow function using multiple line of code
        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("Result is " + res);
        }
     msg2(10,20);

     //IIFE:-
     (function(){
        console.log("Hello World!");

     })();
     //short code 
     (msg=>console.log("Hello"))();

     //promises:- used to handle asynchronous operation is JS

     let myPromise=new Promise(function(resolve,reject){
     let age=25;
     if(age>=18){
        resolve("vaid age");
     }
     else{
        reject("wait for next year");
     }
    });
    myPromise
    .then(msg=>console.log(msg))
    .catch(error=>console.log(error));
    console.log(myPromise);

    //async ans await are modern Javascript features that provide a more elegant way to handle asynchronous functions and promises.
     //api ...
     async function userInfo() {
        try{
        let userData=await fetch('https://dummyjson.com/products');
        let response=await userData.json();
        console.log(response);
     } //try block end it is used to test a block of code for error
     catch(error){
        console.log(error);
     }  //catch block end it is used to handle error
     }
     userInfo();
     let num=[4,6,7,8,9,3,2,1];
     //map
     let square=num.map(n=>n*n);
     console.log(square);
     //reduce
     let sum=num.reduce((total,n)=>total+n);
     console.log(sum);
     //filter
     let sorting=num.filter(n=>n>2);
     console.log(sorting);
     //forEach
     num.forEach(n=>console.log(n*2));

     //local storage:- it is a web storage that allows you to store data in browser and it is persistent even after closing the browser
     let myInfo={
        name:'Vivek',
        age:20,
        addresss:'Bihar',
        phone:9142046063,
     };
     localStorage.setItem('myInfo',JSON.stringify(myInfo));
     let storeData=JSON.parse(localStorage.getItem('myInfo'));
     console.log(storeData.name);
      
    </script>
    
</body>
</html>
