<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //Function:- block of code,used or defined to perform specific
        //Types of Function
        //normal function: with para,without para,and with default para
        //normal function without parameter..
        function demo() {
            console.log("Hello JS");
        }
        demo(); //function calling
        //with parameter..
        function demo1(text){
            console.log("Hello "+ text);
        }
        demo1("react");

        //default parameter

        function add(a,b=10){
            console.log("Addition is " + (a+b));
        }
        add(123);
        //sycronous 
        function cal(){
            function add(a,b){
                console.log(a+b);

            }
            function mul(x,y){
                console.log(x*y);
            }
            function sub(p,q){
                console.log(p-q);
            }
        
        add(3,4);
        sub(9,6);
        mul(3,6);
        }
        cal();
        //anonymous function:- function without name
        let msg=function(){
            console.log("Hello ABES");
            //console.log(typeof(msg));
        }
        msg();
        //arrow function:- short code and more concise syntax for writing function in JS
        let msg1=()=>console.log("Hello ABESSS EC");
        msg1();
        // arrow function using multiple line of code
        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("Result is " + res);
        }
     msg2(10,20);

     //IIFE:-
     (function(){
        console.log("Hello World!");

     })();
     //short code 
     (msg=>console.log("Hello"))();
    </script>
    
</body>
</html>
